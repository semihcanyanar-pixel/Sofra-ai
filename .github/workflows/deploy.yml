name: Deploy Sofra AI

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Inject Keys
        env:
          GM: ${{ secrets.GOOGLE_MAPS_KEY }}
          CL: ${{ secrets.ANTHROPIC_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          with open('index.html', 'r') as f:
              html = f.read()
          html = html.replace("localStorage.getItem('s_gm')||''", f"'{os.environ['GM']}'")
          html = html.replace("localStorage.getItem('s_cl')||''", f"'{os.environ['CL']}'")
          with open('index.html', 'w') as f:
              f.write(html)
          EOF

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
