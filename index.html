<style>

.sgo{margin-top:7px;width:100%;background:var(--ac);color:#fff;border:none;border-radius:22px;padding:9px 0;font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .18s}

.md{background:var(--sf);border-radius:18px;padding:20px;max-width:380px;width:100%;box-shadow:0 20px 70px rgba(0,0,0,.7);border:1px solid var(--bd)}
.md h3{font-size:1.05rem;font-weight:600;color:var(--wh);margin-bottom:11px}
.md input,.md select{width:100%;padding:8px 13px;border:1px solid var(--bd);border-radius:11px;font-size:.82rem;outline:none;margin-bottom:9px;color:var(--tx);background:#252525;font-family:'DM Sans'}

#mfab{display:none;position:fixed;bottom:20px;left:20px;z-index:200;background:var(–ac);color:#fff;border:none;border-radius:50%;width:46px;height:46px;font-size:1.15rem;cursor:pointer;box-shadow:0 4px 18px rgba(230,0,35,.45);align-items:center;justify-content:center}

</style>

<script>
// ── API KEYS (Firebase Remote Config'ten yüklenir) ──
let CLAUDE_KEY   = '';
let GOOGLE_KEY   = '';
let GOOGLE_CX    = '';
let UNSPLASH_KEY = 'C_yRkMGiiiPRusXG-gzBteoysa6WqUDjAjVEtDijJL8';
let _userId      = null;

// ── STATE ──
let grid=3, filters={style:null,gender:null,season:null};
let gallery=[], albums=['Günlük','Spor','İş','Özel Gün'], curAlbum='', pinResults=[];

// localStorage'dan galeriyi yükle
function loadGalleryLocal(){
  try{ gallery=JSON.parse(localStorage.getItem('kombin_gallery')||'[]'); }catch(e){ gallery=[]; }
  renderGallery(); renderAlbumUI();
}
function saveGalleryLocal(){
  try{ localStorage.setItem('kombin_gallery', JSON.stringify(gallery)); }catch(e){}
}

// ── CHIP SEÇİMİ ──
['cs','cg','cm'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    const chip=e.target.closest('.chip'); if(!chip)return;
    const was=chip.classList.contains('on');
    document.getElementById(id).querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    if(!was) chip.classList.add('on');
    const key=id==='cs'?'style':id==='cg'?'gender':'season';
    filters[key]=was?null:chip.dataset.v;
    renderPills();
  });
});

function renderPills(){
  const w=document.getElementById('pills'); w.innerHTML='';
  Object.entries({style:filters.style,gender:filters.gender,season:filters.season}).forEach(([k,v])=>{
    if(!v)return;
    const d=document.createElement('div'); d.className='pill';
    d.innerHTML=`${v} <button onclick="clearFilter('${k}')">✕</button>`;
    w.appendChild(d);
  });
}
function clearFilter(key){
  filters[key]=null;
  const id=key==='style'?'cs':key==='gender'?'cg':'cm';
  document.getElementById(id).querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  renderPills();
}

function setGrid(n){
  grid=n;
  document.getElementById('gp').querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on',i+1===n));
  document.getElementById('pgrid').className=`pgrid c${n}`;
}
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
}
function toggleSide(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mbk').classList.toggle('open');
}
function setLoading(on){
  document.getElementById('sgo').classList.toggle('ld',on);
  document.getElementById('slbl').textContent=on?'Aranıyor…':'🔍 AI ile Ara';
}

// ── ARAMA ──
async function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q){toast('Lütfen bir arama yazın');return;}
  setLoading(true);
  try{
    const r=await refineQuery(q);
    await fetchImages(r);
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    document.getElementById('tab-discover').classList.add('on');
    document.querySelectorAll('.ntab').forEach((b,i)=>b.classList.toggle('on',i===0));
    if(window.innerWidth<740)toggleSide();
  }catch(e){toast('Hata: '+e.message);}
  finally{setLoading(false);}
}

async function applyFilters(){
  if(!filters.style&&!filters.gender&&!filters.season){toast('En az bir filtre seçin');return;}
  const q=[filters.gender,filters.season,filters.style,'kombin'].filter(Boolean).join(' ');
  setLoading(true);
  try{
    const r=await refineQuery(q);
    await fetchImages(r);
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    document.getElementById('tab-discover').classList.add('on');
    document.querySelectorAll('.ntab').forEach((b,i)=>b.classList.toggle('on',i===0));
    if(window.innerWidth<740)toggleSide();
  }catch(e){toast('Hata: '+e.message);}
  finally{setLoading(false);}
}

async function refineQuery(q){
  const lower = q.toLowerCase();
  // Türkçe → İngilizce detaylı çeviri
  const map=[
    ['erkek çocuk','boys kids'],['kız çocuk','girls kids'],
    ['kadın','women'],['erkek','men'],
    ['kış','winter'],['yaz','summer'],['ilkbahar','spring'],['sonbahar','fall autumn'],
    ['spor','athletic sporty streetwear'],['smart casual','smart casual'],
    ['casual','casual everyday'],['klasik','classic formal elegant'],
    ['boho','bohemian boho'],['kombin','outfit look style'],
    ['takım','suit outfit'],['elbise','dress'],['pantolon','pants trousers'],
    ['etek','skirt'],['ceket','jacket blazer'],['kazak','sweater knit'],
    ['mont','coat winter jacket'],['sneaker','sneakers'],['topuklu','heels']
  ];
  let r = lower;
  map.forEach(([tr,en])=>{ r = r.replace(new RegExp(tr,'g'), en); });
  // Temizle ve fashion ekle
  r = r.replace(/\s+/g,' ').trim();
  if(!r.includes('outfit')&&!r.includes('look')&&!r.includes('style')) r += ' outfit';
  if(!r.includes('fashion')&&!r.includes('style')) r += ' fashion';

  if(!CLAUDE_KEY) return r;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':CLAUDE_KEY,'anthropic-version':'2023-06-01','content-type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:50,
        system:'Convert this to a precise English Unsplash photo search query for fashion/outfit photos. Be very specific about clothing style. Return ONLY 4-7 words.',
        messages:[{role:'user',content:q}]})
    });
    const d=await resp.json();
    return d.content?.[0]?.text?.trim()||r;
  }catch(e){return r;}
}

async function fetchImages(query){
  const[gI,uI]=await Promise.all([fetchGoogle(query),fetchUnsplash(query)]);
  const merged=[];let gi=0,ui=0;
  while(merged.length<28){
    if(gi<gI.length&&merged.length%3<2)merged.push(gI[gi++]);
    else if(ui<uI.length)merged.push(uI[ui++]);
    else if(gi<gI.length)merged.push(gI[gi++]);
    else break;
  }
  const scored=merged.map(img=>({img,s:galScore(img)}));
  scored.sort((a,b)=>b.s-a.s);
  pinResults=scored.map(x=>x.img);
  renderPins();
}

async function fetchGoogle(query){
  if(!GOOGLE_KEY||!GOOGLE_CX)return[];
  try{
    const url=`https://www.googleapis.com/customsearch/v1?key=${GOOGLE_KEY}&cx=${GOOGLE_CX}&q=${encodeURIComponent(query+' outfit')}&searchType=image&num=10&imgSize=large&safe=active`;
    const d=await(await fetch(url)).json();
    return(d.items||[]).map(item=>({url:item.link,thumb:item.image?.thumbnailLink||item.link,title:item.title||query,tags:[]}));
  }catch(e){return[];}
}

async function fetchUnsplash(query){
  if(UNSPLASH_KEY){
    try{
      // Birden fazla varyant sorgula, daha fazla sonuç
      const variants=[
        query,
        query.replace('outfit','look'),
        query.replace('fashion','style streetwear'),
      ];
      const allResults=[];
      for(const v of variants){
        const d=await(await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(v)}&per_page=10&orientation=portrait&client_id=${UNSPLASH_KEY}&order_by=relevant`)).json();
        if(d.results?.length){
          d.results.forEach(p=>{
            if(!allResults.find(x=>x.url===p.urls.regular)){
              allResults.push({url:p.urls.regular,thumb:p.urls.small,title:'',tags:(p.tags||[]).map(t=>t.title)});
            }
          });
        }
      }
      if(allResults.length) return allResults;
    }catch(e){}
  }
  // Picsum + fashion keywords as reliable fallback
  const fashionIds=[1036,1035,1040,1041,1043,1044,1052,1055,1062,1066,
                    1078,1083,1084,1085,1086,1088,1089,1090,1091,1092,
                    334,335,336,337,338,339,340,341];
  const t=Date.now();
  return fashionIds.slice(0,14).map((id,i)=>({
    url:`https://picsum.photos/seed/${id+t}/600/800`,
    thumb:`https://picsum.photos/seed/${id+t}/400/550`,
    title:query+' style '+(i+1),
    tags:query.split(' ')
  }));
}

function galScore(img){
  if(!gallery.length)return 0;
  const kw=[...new Set(gallery.flatMap(g=>(g.album||'').toLowerCase().split(/\s+/)))];
  const txt=(img.title+' '+(img.tags||[]).join(' ')).toLowerCase();
  return kw.filter(k=>k.length>2&&txt.includes(k)).length;
}

function renderPins(){
  const pg=document.getElementById('pgrid');
  document.getElementById('empty').style.display=pinResults.length?'none':'flex';
  pg.innerHTML='';
  const heights=['h-s','h-m','h-m','h-l','h-m','h-xl','h-s','h-l','h-m','h-s','h-xl','h-m','h-l','h-s'];
  pinResults.forEach((img,i)=>{
    const star=galScore(img)>0&&gallery.length>0;
    const h=heights[i%heights.length];
    const c=document.createElement('div'); c.className='pcard '+h;
    c.innerHTML=`
      <img src="${img.thumb||img.url}" alt="${img.title}" loading="lazy"
        onerror="this.style.height='180px';this.style.background='#2a2a2a'"/>
      <div class="pov"></div>
      ${star?'<div class="pstar" title="Gardrobunuzla uyumlu!">⭐</div>':''}`;
    c.onclick=()=>showModal(`
      <img src="${img.url}" style="margin-bottom:10px" onerror="this.style.display='none'"/>
      <div class="mdb" style="margin-top:10px"><button class="cc" onclick="closeModal()">Kapat</button></div>`);
    pg.appendChild(c);
  });
  pg.className=`pgrid c${grid}`;
}

// ── GALERİ ──
function renderGallery(){
  const gg=document.getElementById('gg'); gg.innerHTML='';
  const list=curAlbum?gallery.filter(g=>g.album===curAlbum):gallery;
  list.forEach(item=>{
    const d=document.createElement('div'); d.className='gi';
    d.innerHTML=`
      <img src="${item.url}" alt="${item.album}" loading="lazy" onerror="this.style.display='none'"/>
      <div class="gi-alb">${item.album}</div>
      <button class="gd" onclick="delItem('${item.id}',event)">✕</button>`;
    d.onclick=e=>{if(!e.target.classList.contains('gd'))showModal(`
      <img src="${item.url}" onerror="this.style.display='none'"/>
      <div class="mdb" style="margin-top:10px"><button class="cc" onclick="closeModal()">Kapat</button></div>`);};
    gg.appendChild(d);
  });
  document.getElementById('ulim').textContent=`${gallery.length} / 50 fotoğraf`;
}

function renderAlbumUI(){
  const sel=document.getElementById('alb-sel'), tabs=document.getElementById('atabs');
  sel.innerHTML='<option value="">Tüm Kıyafetler</option>';
  tabs.innerHTML=`<div class="ach on" onclick="filterAlbum(this,'')">Tümü (${gallery.length})</div>`;
  albums.forEach(a=>{
    const o=document.createElement('option'); o.value=a; o.textContent=a; sel.appendChild(o);
    const cnt=gallery.filter(g=>g.album===a).length;
    const ch=document.createElement('div'); ch.className='ach';
    ch.textContent=`${a} (${cnt})`; ch.onclick=()=>filterAlbum(ch,a); tabs.appendChild(ch);
  });
}

function filterAlbum(el,album){
  curAlbum=album;
  document.querySelectorAll('.ach').forEach(c=>c.classList.remove('on'));
  el.classList.add('on'); renderGallery();
}

function openUpload(){
  if(gallery.length>=50){toast('50 fotoğraf sınırına ulaştınız');return;}
  showModal(`<h3>📷 Fotoğraf Ekle</h3>
    <select id="up-alb">${albums.map(a=>`<option value="${a}">${a}</option>`).join('')}</select>
    <div class="uz" onclick="document.getElementById('fi').click()">
      <div class="ui">📁</div><p>Tıklayarak seç</p>
      <p style="font-size:.7rem;margin-top:3px;color:#555">Otomatik sıkıştırılır</p>
    </div>
    <input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="handleUpload(event)"/>
    <div class="mdb"><button class="cc" onclick="closeModal()">İptal</button></div>`);
}

async function handleUpload(e){
  const files=Array.from(e.target.files);
  const album=document.getElementById('up-alb')?.value||albums[0];
  closeModal(); let added=0;
  for(const file of files){
    if(gallery.length>=50)break;
    try{
      const url=await toBase64(file);
      // Firebase varsa oraya kaydet
      if(window._fb && _userId){
        try{
          const{storage,ref,uploadBytes,getDownloadURL,db,collection,addDoc}=window._fb;
          const blob = await compressImg(file,800,.72);
          const sRef = ref(storage,`users/${_userId}/gallery/${Date.now()}_${file.name}`);
          await uploadBytes(sRef,blob);
          const fbUrl = await getDownloadURL(sRef);
          const docRef = await addDoc(collection(db,'users',_userId,'gallery'),{url:fbUrl,album,name:file.name,createdAt:Date.now()});
          gallery.push({id:docRef.id,url:fbUrl,album,name:file.name});
          added++; continue;
        }catch(e){ console.warn('Firebase upload failed, using local',e); }
      }
      gallery.push({id:'u'+Date.now()+added, url, album, name:file.name});
      added++;
    }catch(err){toast('Hata: '+err.message);}
  }
  saveGalleryLocal();
  renderGallery(); renderAlbumUI();
  if(added)toast(`${added} fotoğraf eklendi ✓`);
}

async function compressImg(file,maxW,q){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const s=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*s;c.height=img.height*s;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      c.toBlob(b=>res(b),'image/jpeg',q);URL.revokeObjectURL(url);
    };img.src=url;
  });
}
function toBase64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>res(e.target.result);
    reader.onerror=()=>rej(new Error('Dosya okunamadı'));
    reader.readAsDataURL(file);
  });
}

async function delItem(id,e){
  e.stopPropagation();
  if(!confirm('Bu fotoğrafı sil?'))return;
  if(window._fb && _userId){
    try{
      const{db,deleteDoc,doc}=window._fb;
      await deleteDoc(doc(db,'users',_userId,'gallery',id));
    }catch(e){}
  }
  gallery=gallery.filter(g=>g.id!==id);
  saveGalleryLocal();
  renderGallery(); renderAlbumUI(); toast('Silindi');
}

function openAlbumModal(){
  showModal(`<h3>🗂 Yeni Albüm</h3>
    <input id="an" placeholder="Albüm adı…"/>
    <div class="mdb">
      <button class="ok" onclick="addAlbum()">Oluştur</button>
      <button class="cc" onclick="closeModal()">İptal</button>
    </div>`);
  setTimeout(()=>document.getElementById('an')?.focus(),50);
}
function addAlbum(){
  const name=document.getElementById('an')?.value.trim(); if(!name)return;
  if(!albums.includes(name))albums.push(name);
  renderAlbumUI(); toast('Albüm oluşturuldu'); closeModal();
}

function showModal(html){
  document.getElementById('mw').innerHTML=`<div class="ov" onclick="if(event.target.classList.contains('ov'))closeModal()"><div class="md">${html}</div></div>`;
}
function closeModal(){document.getElementById('mw').innerHTML='';}
function toast(msg){
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(),2800);
}

document.getElementById('q').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSearch();}
});

// BOOT - Firebase init + Loading screen
async function initFirebase(){
  if(!window._fb) return;
  const{auth,signInAnonymously,onAuthStateChanged,remoteConfig,fetchAndActivate,getValue,db,collection,getDocs}=window._fb;
  try{ await signInAnonymously(auth); }catch(e){}
  onAuthStateChanged(auth, async user=>{
    if(!user) return;
    _userId = user.uid;
    // Remote Config'ten key'leri al
    try{
      await Promise.race([
        fetchAndActivate(remoteConfig),
        new Promise((_,r)=>setTimeout(()=>r('timeout'),4000))
      ]);
      const ck = getValue(remoteConfig,'claude_api_key').asString();
      const gk = getValue(remoteConfig,'google_api_key').asString();
      const gc = getValue(remoteConfig,'google_cx').asString();
      if(ck) CLAUDE_KEY = ck;
      if(gk) GOOGLE_KEY = gk;
      if(gc) GOOGLE_CX  = gc;
    }catch(e){ console.warn('Remote config timeout, using defaults'); }
    // Firestore'dan galeriyi yükle
    try{
      const snap = await getDocs(collection(db,'users',_userId,'gallery'));
      gallery=[];
      snap.forEach(d=>gallery.push({id:d.id,...d.data()}));
      renderGallery(); renderAlbumUI();
    }catch(e){ loadGalleryLocal(); }
  });
}
initFirebase();
